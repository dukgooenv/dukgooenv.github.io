name: Reset view counts

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESET to run'
        required: true
        type: string

permissions:
  contents: write

jobs:
  reset-view-counts:
    if: ${{ inputs.confirm == 'RESET' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Reset Firestore counts
        run: npm run reset:view-counts
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Commit zeroed snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Reset view counts'
          file_pattern: rank-snapshot.js
