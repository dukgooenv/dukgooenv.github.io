<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUNG DAEKUN ✖ ZENLESS ZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:ital,wght@0,400;0,700;1,700;1,900&family=Noto+Sans+KR:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #111111;
    --bg-light: #f4f5f7;
    --zzz-yellow: #dfff00;
    --zzz-black: #1a1a1a;
    --text-main: #ffffff;
    --text-dark: #000000;
    --font-head: 'Oswald', sans-serif;
    --font-body: 'Noto Sans KR', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: var(--font-body);
    overflow-x: hidden;
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
  }

  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg-dark); }
  ::-webkit-scrollbar-thumb { background: var(--zzz-yellow); }

  /* --- NAV --- */
  nav {
    position: fixed; top: 0; width: 100%;
    background: rgba(17,17,17,0.9); border-bottom: 3px solid var(--zzz-yellow);
    display: flex; justify-content: center; padding: 15px 0; z-index: 1000;
    backdrop-filter: blur(10px);
  }
  nav a {
    color: var(--text-main); text-decoration: none; font-family: var(--font-head);
    font-size: 22px; font-style: italic; font-weight: 700; margin: 0 20px;
    letter-spacing: 2px; transition: color 0.3s; text-transform: uppercase;
  }
  nav a:hover { color: var(--zzz-yellow); text-shadow: 0 0 10px rgba(223,255,0,0.5); }

  /* --- HERO --- */
  .hero {
    height: 100vh; position: relative; overflow: hidden; background: #000;
    display: flex; align-items: center;
  }
  .hero-bg {
    position: absolute; right: -10%; top: -10%; width: 70%; height: 120%;
    background: url('images/Professional/2021_NCSOFT/2021_NCSOFT_ProjectM_001.webp') center/cover;
    clip-path: polygon(20% 0, 100% 0, 100% 100%, 0 100%);
    filter: grayscale(100%) contrast(1.2); opacity: 0.5;
  }
  .hero-text {
    position: relative; z-index: 2; padding-left: 10%;
  }
  .glitch-title {
    font-family: var(--font-head); font-size: 130px; font-weight: 900; font-style: italic;
    line-height: 0.85; color: transparent; -webkit-text-stroke: 3px var(--text-main);
    text-transform: uppercase; margin-bottom: 20px;
    filter: drop-shadow(5px 5px 0px #00e5ff);
  }
  .glitch-title span { color: var(--zzz-yellow); -webkit-text-stroke: 0; }
  .hero-sub {
    font-family: var(--font-mono); font-size: 24px; color: #000; font-weight: bold;
    background: var(--zzz-yellow); display: inline-block; padding: 10px 30px;
    clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
  }

  /* --- ZZZ LIGHT SECTION --- */
  .zzz-light-section {
    position: relative;
    background-color: var(--bg-light);
    color: var(--text-dark);
    min-height: 100vh;
    padding: 100px 0 100px 0;
    overflow: hidden;
  }
  
  .watermark-light {
    position: absolute;
    top: 50px; right: 5%;
    font-family: var(--font-head);
    font-size: 13vw;
    font-weight: 900;
    font-style: italic;
    color: rgba(0,0,0,0.04);
    line-height: 0.8;
    pointer-events: none;
    z-index: 0;
    text-align: right;
    white-space: nowrap;
  }

  .title-block-left {
    position: absolute;
    left: 0; top: 150px;
    background: var(--zzz-yellow);
    color: #000;
    padding: 30px 40px 30px 5%;
    border-radius: 0 0 60px 0;
    z-index: 10;
    box-shadow: 10px 10px 20px rgba(0,0,0,0.1);
  }
  .title-block-left .ko-title {
    font-family: var(--font-body); font-size: 32px; font-weight: 900; line-height: 1; letter-spacing: -1px;
  }
  .title-block-left .en-title {
    font-family: var(--font-head); font-size: 16px; font-weight: 700; letter-spacing: 1px; margin-bottom: 5px; text-transform: uppercase;
  }
  .title-block-left .num-title {
    font-family: var(--font-head); font-size: 80px; font-weight: 900; line-height: 0.8; letter-spacing: -2px;
  }

  /* Carousel */
  .carousel-container {
    margin-top: 150px;
    padding-left: 320px;
    padding-right: 5%;
    position: relative;
    z-index: 5;
  }
  .carousel-track {
    display: flex; gap: 30px; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 20px; scrollbar-width: none;
  }
  .carousel-track::-webkit-scrollbar { display: none; }
  .carousel-item {
    flex: 0 0 600px; scroll-snap-align: start;
    background: #fff; border-radius: 20px; overflow: hidden;
    box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    cursor: pointer; transition: transform 0.3s;
    position: relative;
  }
  .carousel-item:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
  .carousel-item img { width: 100%; height: 340px; object-fit: cover; }
  .carousel-item-info {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    padding: 30px 20px 20px 20px; color: #fff;
  }
  .c-item-title { font-family: var(--font-body); font-size: 32px; font-weight: 900; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
  .c-item-sub { font-family: var(--font-mono); font-size: 16px; color: var(--zzz-yellow); font-weight: bold; }

  /* Filter Tabs */
  .filter-tabs {
    background: #1a1a1a;
    border-radius: 50px;
    display: inline-flex;
    padding: 6px;
    margin: 40px 0 40px 320px;
    z-index: 5; position: relative;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  }
  .filter-btn {
    background: transparent; color: #fff; border: none;
    padding: 12px 30px; border-radius: 50px;
    font-family: var(--font-body); font-size: 18px; font-weight: 700;
    cursor: pointer; transition: all 0.3s;
  }
  .filter-btn.active { background: #fff; color: #000; }
  .filter-btn:hover:not(.active) { color: var(--zzz-yellow); }

  /* Grid */
  .light-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 25px;
    padding-left: 320px; padding-right: 5%;
    z-index: 5; position: relative;
  }
  .light-card {
    background: #fff; border-radius: 20px; overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.3s;
    border: 1px solid #eaeaea;
  }
  .light-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); border-color: var(--zzz-yellow); }
  .light-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
  .light-card-info { padding: 20px; }
  .lc-title { font-family: var(--font-body); font-size: 22px; font-weight: 900; color: #000; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .lc-sub { font-family: var(--font-mono); font-size: 14px; color: #666; font-weight: bold; }

  /* Lightbox */
  #lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000;
    flex-direction: column; align-items: center; justify-content: center;
  }
  #lightbox.active { display: flex; }
  .lb-close { position: absolute; top: 30px; right: 40px; background: none; border: none; color: var(--zzz-yellow); font-size: 50px; cursor: pointer; font-family: var(--font-head); z-index: 10; font-style: italic; }
  .lb-content { width: 90vw; height: 80vh; display: flex; align-items: center; justify-content: center; }
  .lb-content img { max-width: 100%; max-height: 100%; border: 4px solid var(--zzz-yellow); box-shadow: 10px 10px 0 #000; object-fit: contain; }
  .lb-content iframe { width: 80vw; height: 45vw; max-height: 80vh; border: 4px solid var(--zzz-yellow); box-shadow: 10px 10px 0 #000; }
  
  footer {
    background: #000;
    color: var(--zzz-yellow);
    padding: 40px;
    text-align: center;
    font-size: 24px;
    font-family: var(--font-head); font-weight: 900; font-style: italic;
    border-top: 5px solid var(--zzz-yellow);
  }
  
  @media(max-width: 1024px) {
    .title-block-left { top: 50px; padding: 20px; border-radius: 0 0 30px 0; }
    .carousel-container, .filter-tabs, .light-grid { padding-left: 5%; }
    .carousel-container { margin-top: 250px; }
  }
</style>
</head>
<body>

  <nav>
    <a href="#hero">START</a>
    <a href="#professional">PROFESSIONAL</a>
    <a href="#personal">PERSONAL</a>
  </nav>

  <section class="hero" id="hero">
    <div class="hero-bg"></div>
    <div class="hero-text">
      <h1 class="glitch-title">JUNG<br><span>DAEKUN</span></h1>
      <div class="hero-sub">ENVIRONMENT ARTIST // LEVEL MAX</div>
    </div>
  </section>

  <!-- PROFESSIONAL SECTION -->
  <section class="zzz-light-section" id="professional">
    <div class="watermark-light">PROFESSIONAL</div>
    <div class="title-block-left">
      <div class="ko-title">공식 의뢰</div>
      <div class="en-title">Professional Works</div>
      <div class="num-title">01</div>
    </div>

    <!-- Carousel -->
    <div class="carousel-container">
      <div class="carousel-track" id="prof-carousel"></div>
    </div>

    <!-- Filters -->
    <div class="filter-tabs">
      <button class="filter-btn active" onclick="filterProf('ALL')">ALL</button>
      <button class="filter-btn" onclick="filterProf('LIONHEART')">LIONHEART</button>
      <button class="filter-btn" onclick="filterProf('NCSOFT')">NCSOFT</button>
      <button class="filter-btn" onclick="filterProf('NEXON')">NEXON</button>
    </div>

    <!-- Grid -->
    <div class="light-grid" id="prof-grid"></div>
  </section>

  <!-- PERSONAL SECTION -->
  <section class="zzz-light-section" id="personal" style="background-color: #e5e6e8;">
    <div class="watermark-light">PERSONAL</div>
    <div class="title-block-left">
      <div class="ko-title">개인 아카이브</div>
      <div class="en-title">Personal Archive</div>
      <div class="num-title">02</div>
    </div>

    <!-- Carousel -->
    <div class="carousel-container">
      <div class="carousel-track" id="pers-carousel"></div>
    </div>

    <div class="filter-tabs">
      <button class="filter-btn active">ALL WORKS</button>
    </div>

    <div class="light-grid" id="pers-grid"></div>
  </section>

  <footer>
    INTER-KNOT SYSTEM ONLINE // JUNG DAEKUN © 2026 // END OF FILE
  </footer>

  <div id="lightbox">
    <button class="lb-close" onclick="closeLb()">X</button>
    <div class="lb-content" id="lb-content"></div>
  </div>

<script>
const profData = [
  { key:'lionheart', title: 'ODIN: VALHALLA RISING', sub: 'Lionheart Studio', thumb: 'https://img.youtube.com/vi/tvAcoxRube0/mqdefault.jpg', type:'video', id:'tvAcoxRube0', filter:'LIONHEART' },
  { key:'ncsoft', title: 'Project M', sub: 'NCSoft / Interactive Adventure', thumb: 'https://img.youtube.com/vi/bDXLAaqR_Yg/mqdefault.jpg', type:'video', id:'bDXLAaqR_Yg', filter:'NCSOFT' },
  { key:'changse', title: '창세기전: 회색의 잔영', sub: 'Line Games', thumb: 'https://img.youtube.com/vi/2zKdRMch0Us/mqdefault.jpg', type:'video', id:'2zKdRMch0Us', filter:'ALL' },
  { key:'nexon', title: 'Ascendant One', sub: 'Nexon Korea', thumb: 'images/Professional/2018_NexonKorea/2018_Nexon_AscendantOne_001.webp', type:'video', id:'NOZ51TUyemo', filter:'NEXON' },
  { key:'xlgames', title: 'Civilization Online', sub: 'XLGames', thumb: 'images/Professional/2017_XLGAMES/2017_XLGAMES_X3_001.webp', type:'video', id:'behf7twp1bo', filter:'ALL' },
  { key:'neptune', title: 'Neppy Rush', sub: 'Neptune', thumb: 'https://img.youtube.com/vi/k4VzC93T00g/mqdefault.jpg', type:'video', id:'k4VzC93T00g', filter:'ALL' }
];

const persData = [
  { key:'genesis', title: 'Genesis G70', sub: 'Re:Lighting / UE5', thumb: 'images/ReLighting/20241027_GENESIS_G70/GENESIS_G70_Thumb.webp', type:'image', src:'images/ReLighting/20241027_GENESIS_G70/GENESIS_G70_01.webp' },
  { key:'m4', title: 'M4 Carbine', sub: 'Weapon Prop', thumb: 'images/Personal/20190902_M4/M4_M203_Thumb.webp', type:'image', src:'images/Personal/20190902_M4/M4_M203_001.webp' },
  { key:'rock', title: 'Modular Rock', sub: 'Zbrush / Substance', thumb: 'images/Personal/20201124_RockStudy/Rock_Final_Thumb.webp', type:'image', src:'images/Personal/20201124_RockStudy/Rock_Final_001.webp' },
  { key:'hideout', title: 'The Urban Hideout', sub: 'Environment Scene', thumb: 'images/Personal/20140613_Hideout/2014_Hideout_Thumb.webp', type:'video', id:'mcTm2DmXd3Y' },
  { key:'bmw', title: 'BMW M4 GTS', sub: 'Re:Lighting / UE5', thumb: 'images/ReLighting/20240912_BMW_M4GTS/BMW_M4GTS_Thumb.webp', type:'image', src:'images/ReLighting/20240912_BMW_M4GTS/BMW_M4GTS_01.webp' }
];

function renderCarousel(containerId, dataArray) {
  const container = document.getElementById(containerId);
  let html = '';
  const topItems = dataArray.slice(0, 3);
  
  topItems.forEach((p, i) => {
    let action = p.type === 'video' ? `openLbVideo('${p.id}')` : `openLbImage('${p.src}')`;
    html += `
      <div class="carousel-item" onclick="${action}">
        <img src="${p.thumb}">
        <div class="carousel-item-info">
          <div class="c-item-title">${p.title}</div>
          <div class="c-item-sub">${p.sub}</div>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

function renderGrid(containerId, dataArray) {
  const container = document.getElementById(containerId);
  let html = '';
  dataArray.forEach(p => {
    let action = p.type === 'video' ? `openLbVideo('${p.id}')` : `openLbImage('${p.src}')`;
    html += `
      <div class="light-card" onclick="${action}">
        <img src="${p.thumb}">
        <div class="light-card-info">
          <div class="lc-title">${p.title}</div>
          <div class="lc-sub">${p.sub}</div>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

function filterProf(keyword) {
  const btns = document.querySelectorAll('#professional .filter-btn');
  btns.forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  let filtered = profData;
  if (keyword !== 'ALL') {
    filtered = profData.filter(p => p.filter === keyword || p.title.toUpperCase().includes(keyword));
    if(filtered.length === 0) filtered = profData;
  }
  renderGrid('prof-grid', filtered);
}

renderCarousel('prof-carousel', profData);
renderGrid('prof-grid', profData);

renderCarousel('pers-carousel', persData);
renderGrid('pers-grid', persData);

function openLbVideo(id) {
  document.getElementById('lb-content').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" frameborder="0" allow="autoplay; fullscreen"></iframe>`;
  document.getElementById('lightbox').classList.add('active');
}
function openLbImage(src) {
  document.getElementById('lb-content').innerHTML = `<img src="${src}">`;
  document.getElementById('lightbox').classList.add('active');
}
function closeLb() {
  document.getElementById('lightbox').classList.remove('active');
  document.getElementById('lb-content').innerHTML = '';
}
</script>

</body>
</html>
